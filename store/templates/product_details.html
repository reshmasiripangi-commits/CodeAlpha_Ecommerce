<div class="card" style="width: 18rem;">
    {% if product.image %}
        <img src="{{ product.image }}" class="card-img-top" alt="{{ product.name }}">
    {% endif %}
    <div class="card-body">
        <h5>{{ product.name }}</h5>
        <p>₹{{ product.price }}</p>
        <a href="/product/{{ product.id }}/" class="btn btn-primary">
            View Details
        </a>
    </div>
</div>
